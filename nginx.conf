# MRLC GED App — Nginx reverse proxy config
# Place in /etc/nginx/sites-available/mrlc-ged and symlink to sites-enabled

server {
    listen 80;
    server_name your-domain.com;   # ← replace with your actual domain or IP

    # Redirect all HTTP to HTTPS (comment out if not using SSL)
    # return 301 https://$host$request_uri;

    # Increase upload size for CSV imports
    client_max_body_size 10M;

    # Proxy all requests to the Node app
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:4000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

